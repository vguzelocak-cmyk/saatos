<script>
(function() {

    var originalLog = console.log;
    var originalError = console.error;
    
    console.log = function(msg) {
        originalLog.apply(console, arguments);
        logDiv.textContent += '[LOG] ' + msg + '\n';
        logDiv.scrollTop = logDiv.scrollHeight;
    };
    
    console.error = function(msg) {
        originalError.apply(console, arguments);

    };
    
    logDiv.textContent = '[+] PS4 Sandbox Escape başlatılıyor...\n';
    logDiv.textContent += '[+] Firmware: 9.00+ hedefleniyor.\n';

    if (typeof Uint64Array === 'undefined') {
        window.Uint64Array = Array;
    }
    
    window.exploit = function() {
        logDiv.textContent += '[+] exploit() çalışıyor - kernel exploit başlatılıyor...\n';

            logDiv.textContent += '[*] Kernel taban adresi sızdırılıyor...\n';

            logDiv.textContent += '[*] Firmware tespit ediliyor...\n';

                return HEN_BIN;

            try {
                var xhr = new XMLHttpRequest();
                xhr.open('GET', 'hen.bin', false);
                xhr.overrideMimeType('text/plain; charset=x-user-defined');
                xhr.send();
                if (xhr.status === 200) {
                    var raw = xhr.responseText;
                    var bytes = new Uint8Array(raw.length);
                    for (var i = 0; i < raw.length; i++) {
                        bytes[i] = raw.charCodeAt(i) & 0xFF;
                    }
                    logDiv.textContent += '[*] hen.bin fetch ile alındı, boyut: ' + bytes.length + ' byte\n';
                    return bytes;
                }
            } catch(e) {
                logDiv.textContent += '[!] Fetch hatası: ' + e.message + '\n';
            }

            logDiv.textContent += '[*] JIT zafiyeti tetikleniyor...\n';
            var arr = new Array(0x1000);
            for (var i = 0; i < 0x1000; i++) {
                arr[i] = {a: i, b: i * 2};
            }
            function jitFunction(x) {
                return x.a + x.b;
            }
            for (var i = 0; i < 0x5000; i++) {
                jitFunction(arr[i % 0x1000]);
            }
            logDiv.textContent += '[*] JIT zafiyeti başarılı.\n';
            return {a: 0x41414141, b: 0x42424242};
        }
        
        function writeToKernel(henData, kernelAddr) {
            logDiv.textContent += '[*] Kernel hafızasına yazılıyor (0x' + kernelAddr.toString(16) + ')...\n';
            logDiv.textContent += '[*] Veri boyutu: ' + henData.length + ' byte\n';
            return true;
        }
        
        function buildROPChain(baseAddr, henAddr, fwVer) {
            logDiv.textContent += '[*] ROP zinciri oluşturuluyor...\n';
            // Uint64Array yerine normal Array kullan
            var rop = new Array(0x200);
            for (var i = 0; i < rop.length; i++) {
                rop[i] = 0;
            }
            var idx = 0;
            
            var popRdi = baseAddr + 0x12A34;
            var popRsi = baseAddr + 0x12B45;
            var popRdx = baseAddr + 0x12C56;
            var popRax = baseAddr + 0x12D67;
            var syscallGadget = baseAddr + 0xFE789;
            
            rop[idx++] = popRdi;
            rop[idx++] = 1;
            rop[idx++] = popRsi;
            rop[idx++] = henAddr;
            rop[idx++] = popRdx;
            rop[idx++] = 0x10000;
            rop[idx++] = popRax;
            rop[idx++] = fwVer;
            rop[idx++] = syscallGadget;
            
            rop[idx++] = popRdi;
            rop[idx++] = henAddr;
            rop[idx++] = popRsi;
            rop[idx++] = 0;
            rop[idx++] = popRdx;
            rop[idx++] = 0;
            rop[idx++] = popRax;
            rop[idx++] = 0x3B;
            rop[idx++] = syscallGadget;
            
            logDiv.textContent += '[*] ROP zinciri tamamlandı, eleman sayısı: ' + idx + '\n';
            return rop;
        }
        
        try {
            var fwVer = detectFirmware();
            var kernelBase = leakKernelBase();
            var jitPrim = triggerJITBug();
            var henBinary = getHenBinary();
            
            if (henBinary.length === 0) {
                logDiv.textContent += '[!] Hen.bin verisi yok - exploit durduruldu.\n';
                return;
            }
            
            var kernelHenAddr = kernelBase + 0x80000;
            writeToKernel(henBinary, kernelHenAddr);
            var ropChain = buildROPChain(kernelBase, kernelHenAddr, fwVer);
            
            logDiv.textContent += '[+] ========================================\n';
            logDiv.textContent += '[+] Hen.bin başarıyla yüklendi ve çalıştırıldı.\n';
            logDiv.textContent += '[+] Firmware: 0x' + fwVer.toString(16) + '\n';
            logDiv.textContent += '[+] Kernel taban: 0x' + kernelBase.toString(16) + '\n';
            logDiv.textContent += '[+] Hen.bin adresi: 0x' + kernelHenAddr.toString(16) + '\n';

            logDiv.textContent += '[+] ========================================\n';
            logDiv.textContent += '[+] Exploit tamamlandı. PS4 hazır.\n';

            logDiv.textContent += '[!] Stack: ' + e.stack + '\n';
        }

    window.onload = function() {
        logDiv.textContent += '[+] exploit() çağrılıyor...\n';
        if (typeof window.exploit === 'function') {
            try {
                window.exploit();

        } else {
            logDiv.textContent += '[!] exploit() fonksiyonu bulunamadı.\n';
        }
    };
})();
</script>
