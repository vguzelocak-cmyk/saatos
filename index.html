<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS4 Sandbox Escape İstasyonu</title>
    <style>
        body { 
            font-family: 'Courier New', monospace; 
            background: #05050a; 
            color: #00ff66; 
            text-align: center; 
            padding: 40px 20px; 
        }
        h1 { 
            color: #ff3333; 
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.6);
            font-size: 2rem;
        }
        .console-container { 
            background: #0a0a14; 
            max-width: 650px; 
            margin: 30px auto; 
            padding: 30px; 
            border-radius: 8px; 
            border: 1px solid #ff3333; 
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.2); 
            text-align: left;
        }
        .btn-escape { 
            background: linear-gradient(45deg, #ff3333, #990000); 
            border: none; 
            color: white; 
            padding: 15px 30px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            width: 100%; 
            box-shadow: 0 4px 15px rgba(255, 51, 51, 0.4);
            font-family: 'Courier New', monospace;
        }
        .btn-escape:hover { 
            box-shadow: 0 0 25px rgba(255, 51, 51, 0.8); 
            transform: scale(1.01); 
        }
        .btn-escape:disabled {
            background: #222 !important;
            color: #555 !important;
            box-shadow: none !important;
        }
        .log-line {
            margin: 8px 0;
            line-height: 1.4;
            font-size: 0.95rem;
        }
        .text-white { color: #fff; }
        .text-yellow { color: #ffff00; }
        .text-red { color: #ff3333; }
    </style>
</head>
<body>

    <h1>[!] CRITICAL: PS4 SANDBOX ESCAPE LAB [!]</h1>

    <div class="console-container">
        <button class="btn-escape" id="btnEscape" onclick="startSandboxEscape()">TRIGGER SANDBOX ESCAPE (FETCH PAYLOAD)</button>
        <hr style="border-color: #333; margin: 20px 0;">
        <div id="terminalLog">
            <div class="log-line text-white">>> Sistem hazır. WebKit zafiyet tetikleyicisi bekleniyor...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
