<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS4 Beyaz Şapkalı Exploit Menüsü</title>
    <style>
        /* Kaotik Dark/Neon Tema Ayarları */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0a0a12; 
            color: #e0e0e0; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
        }
        h1 { 
            color: #00adb5; 
            font-size: 2.8rem; 
            text-shadow: 0 0 15px rgba(0, 173, 181, 0.6);
            margin-bottom: 5px;
        }
        .subtitle {
            color: #888;
            font-size: 1rem;
            margin-bottom: 40px;
        }
        .menu-container { 
            background: #111122; 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 40px 30px; 
            border-radius: 16px; 
            border: 1px solid #22223b; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
        }
        
        /* Buton Grubu ve Tasarımları */
        .btn-group { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 20px; 
            margin: 25px 0; 
        }
        .btn-exploit { 
            background: linear-gradient(45deg, #00adb5, #007580); 
            border: none; 
            color: white; 
            padding: 16px 40px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            width: 85%; 
            box-shadow: 0 4px 10px rgba(0, 173, 181, 0.2);
        }
        .btn-exploit:hover { 
            box-shadow: 0 0 20px rgba(0, 173, 181, 0.6); 
            transform: translateY(-2px); 
        }
        .btn-hen { 
            background: linear-gradient(45deg, #ff9f43, #ff6b6b) !important; 
            box-shadow: 0 4px 10px rgba(255, 159, 67, 0.2);
        }
        .btn-hen:hover { 
            box-shadow: 0 0 20px rgba(255, 159, 67, 0.6) !important; 
        }
        .btn-exploit:disabled {
            background: #333 !important;
            color: #666 !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
        }
        
        /* Dinamik Yükleme Çubuğu */
        .progress-container { 
            display: none; 
            width: 85%; 
            background-color: #1a1a2e; 
            border-radius: 20px; 
            margin: 30px auto 10px auto; 
            padding: 4px; 
            border: 1px solid #33334d; 
        }
        .progress-bar { 
            width: 0%; 
            height: 22px; 
            background: linear-gradient(45deg, #ff2e63, #ff6768); 
            border-radius: 20px; 
            text-align: center; 
            line-height: 22px; 
            color: white; 
            font-size: 0.85rem; 
            font-weight: bold; 
            transition: width 0.05s ease; 
        }
        
        /* Durum Log Ekranı */
        #durumMesaji { 
            margin-top: 20px; 
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            color: #00ff66; 
            text-shadow: 0 0 5px rgba(0, 255, 102, 0.3);
        }
    </style>
</head>
<body>

    <h1>🏴‍☠️ PS4 EXPLOIT & PAYLOAD LAB 🏴‍☠️</h1>
    <div class="subtitle">Beyaz Şapkalı WebKit Zafiyet ve ArrayBuffer Yükleme İstasyonu</div>

    <div class="menu-container">
        <div class="btn-group">
            <!-- XSS Tetikleyici Buton -->
            <button class="btn-exploit" id="btnXss" onclick="exploitYukle('xss')">1. WebKit XSS Testini Başlat</button>
            
            <!-- Gerçek Hen.bin Dosyasını Çekecek Buton -->
            <button class="btn-exploit btn-hen" id="btnHen" onclick="exploitYukle('hen')">2. GitHub'dan hen.bin Yükle</button>
        </div>
        
        <!-- Yükleme Çubuğu (JS Kontrol Ediyor) -->
        <div class="progress-container" id="yuklemeAlani">
            <div class="progress-bar" id="cubuk">0%</div>
        </div>
        
        <!-- Canlı Log Yazısı -->
        <div id="durumMesaji">>> Sistem hazır, payload seçimi bekleniyor...</div>
    </div>

    <!-- Yazdığımız script.js Kodlarını Çağırıyoruz -->
    <script src="script.js"></script>
</body>
</html>
