<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Beyaz Şapkalı Laboratuvarı - XSS Testi</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 40px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; max-width: 500px; }
        input[type="text"] { width: 80%; padding: 10px; background: #2a2a2a; border: 1px solid #443; color: white; }
        button { padding: 10px 20px; background: #00adb5; border: none; color: white; cursor: pointer; font-weight: bold; }
        #sonuc { margin-top: 20px; padding: 15px; background: #252525; border-left: 5px solid #ff2e63; }
        .safe { border-left: 5px solid #00adb5 !important; }
    </style>
</head>
<body>

    <h2>🕵️‍♂️ XSS (Siteler Arası Komut Çalıştırma) Laboratuvarı</h2>
    <p>Aşağıdaki kutuya normal bir kelime yazarsan normal çalışır. Ama bir hacker gibi JavaScript kodu yazarsan sistemi patlatırsın!</p>

    <div class="box">
        <input type="text" id="aramaKutusu" placeholder="Bir şeyler aratın...">
        <button onclick="aramaYap()">Ara</button>
        
        <div id="sonuc">
            Aratılan Kelime: <span id="cikisEkrani"></span>
        </div>
    </div>

    <p style="margin-top:20px;">
        <button onclick="guvenlikModuDegistir()" id="btnGuvenlik" style="background:#ff2e63;">Güvenlik Modu: KAPALI (Zafiyetli)</button>
    </p>

    <!-- JavaScript Kodlarımızı Çağırıyoruz -->
    <script src="script.js"></script>
</body>
</html>
